<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Rafter Secrets — your secrets, mapped</title>
<meta name="referrer" content="no-referrer">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%230a0a0a'/%3E%3Cpath d='M11 14v-2a5 5 0 0 1 10 0v2' fill='none' stroke='%23fafafa' stroke-width='2'/%3E%3Crect x='9' y='14' width='14' height='10' rx='2' fill='%23fafafa'/%3E%3C/svg%3E">
<style>
  /* ── Rafter Secrets · monochrome "audit ledger" theme ──────────────
     Light is the default; dark follows the OS via prefers-color-scheme and
     is overridable with [data-theme] (set by the toggle). All app colour
     flows through these tokens, so both themes stay in lockstep. */
  :root {
    --bg:        #f5f5f4;
    --panel:     #ffffff;
    --panel-2:   #ffffff;
    --raised:    #f0f0ef;
    --border:    #e7e7e4;
    --border-2:  #d8d8d4;
    --text:      #0a0a0a;
    --text-dim:  #383836;
    --muted:     #6f6f6b;
    --faint:     #a1a19c;
    --primary:    #0a0a0a;
    --primary-fg: #fafafa;
    --green:     #1a7a47;  --green-dim: #e9f4ed;  --green-bd: #c9e6d4;
    --amber:     #9a5b09;  --amber-dim: #f9f0e0;  --amber-bd: #ecd9b2;
    --red:       #b5362b;  --red-dim:   #fbeae8;  --red-bd:   #f0cdc8;
    --blue:      #275ea3;  --blue-dim:  #eaf0f8;  --blue-bd:  #cfddf1;
    --focus:     #0a0a0a;
    --shadow:    0 1px 2px rgba(10,10,10,.04), 0 12px 32px rgba(10,10,10,.06);
    --grid:      rgba(10,10,10,.025);
    --sans: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, system-ui, sans-serif;
    --mono: "Roboto Mono", "Geist Mono", ui-monospace, "SF Mono", SFMono-Regular, Menlo, Consolas, monospace;
  }
  [data-theme="dark"] {
    --bg:        #0a0a0a;
    --panel:     #0f0f0f;
    --panel-2:   #121212;
    --raised:    #1c1c1b;
    --border:    #242422;
    --border-2:  #34342f;
    --text:      #fafafa;
    --text-dim:  #d2d2cf;
    --muted:     #9d9d97;
    --faint:     #62625d;
    --primary:    #fafafa;
    --primary-fg: #0a0a0a;
    --green:     #54c98a;  --green-dim: #11251a;  --green-bd: #22402f;
    --amber:     #d99c4e;  --amber-dim: #241b0d;  --amber-bd: #43340f;
    --red:       #ef716a;  --red-dim:   #271210;  --red-bd:   #4a201c;
    --blue:      #6aa6e8;  --blue-dim:  #0f1f37;  --blue-bd:  #1f3a5c;
    --focus:     #fafafa;
    --shadow:    0 1px 2px rgba(0,0,0,.3), 0 18px 44px rgba(0,0,0,.5);
    --grid:      rgba(255,255,255,.02);
  }
  @media (prefers-color-scheme: dark) {
    :root:not([data-theme="light"]) {
      --bg:#0a0a0a; --panel:#0f0f0f; --panel-2:#121212; --raised:#1c1c1b;
      --border:#242422; --border-2:#34342f; --text:#fafafa; --text-dim:#d2d2cf;
      --muted:#9d9d97; --faint:#62625d; --primary:#fafafa; --primary-fg:#0a0a0a;
      --green:#54c98a; --green-dim:#11251a; --green-bd:#22402f;
      --amber:#d99c4e; --amber-dim:#241b0d; --amber-bd:#43340f;
      --red:#ef716a; --red-dim:#271210; --red-bd:#4a201c;
      --blue:#6aa6e8; --blue-dim:#0f1f37; --blue-bd:#1f3a5c;
      --focus:#fafafa;
      --shadow:0 1px 2px rgba(0,0,0,.3),0 18px 44px rgba(0,0,0,.5);
      --grid:rgba(255,255,255,.02);
    }
  }

  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    font: 13.5px/1.55 var(--sans);
    color: var(--text);
    background: var(--bg);
    /* faint ledger grid — atmosphere without noise */
    background-image: linear-gradient(var(--grid) 1px, transparent 1px), linear-gradient(90deg, var(--grid) 1px, transparent 1px);
    background-size: 56px 56px;
    display: flex; flex-direction: column;
    -webkit-font-smoothing: antialiased;
    transition: background-color .2s ease, color .2s ease;
  }
  a { color: var(--blue); text-decoration: none; }
  a:hover { text-decoration: underline; }
  ::selection { background: var(--text); color: var(--bg); }

  /* ── top bar ─────────────────────────────────────────────────────── */
  header.topbar {
    display: flex; align-items: center; gap: 16px;
    padding: 11px 22px;
    border-bottom: 1px solid var(--border);
    background: color-mix(in srgb, var(--panel) 82%, transparent);
    backdrop-filter: blur(10px) saturate(1.1);
    position: sticky; top: 0; z-index: 20;
  }
  .brand { display: flex; align-items: center; gap: 9px; }
  .brand .logo { width: 19px; height: 19px; flex-shrink: 0; color: var(--text); display: flex; }
  .brand .mark { font-weight: 640; font-size: 14.5px; letter-spacing: -0.012em; color: var(--text); }
  .brand .mark .sub { color: var(--muted); font-weight: 480; }

  .segmented { display: inline-flex; background: var(--raised); border: 1px solid var(--border); border-radius: 8px; padding: 2px; gap: 1px; }
  .segmented button { background: transparent; border: none; color: var(--muted); padding: 4px 11px; font-size: 12px; font-weight: 500; border-radius: 6px; transition: color .12s, background .12s; }
  .segmented button:hover { color: var(--text-dim); }
  .segmented button.active { background: var(--panel); color: var(--text); box-shadow: 0 1px 2px rgba(0,0,0,.06); }
  [data-theme="dark"] .segmented button.active { background: #2a2a27; }

  .topbar .spacer { flex: 1; }
  .toast { font-size: 12px; color: var(--green); min-height: 15px; padding-right: 2px; }
  .toast.err { color: var(--red); }

  .icon-btn {
    width: 30px; height: 30px; display: inline-flex; align-items: center; justify-content: center;
    background: transparent; border: 1px solid var(--border); border-radius: 8px; color: var(--muted); cursor: pointer;
    transition: color .12s, border-color .12s, background .12s;
  }
  .icon-btn:hover { color: var(--text); border-color: var(--border-2); background: var(--raised); }
  #theme-toggle .sun { display: none; }
  #theme-toggle .moon { display: block; }
  [data-theme="dark"] #theme-toggle .sun { display: block; }
  [data-theme="dark"] #theme-toggle .moon { display: none; }
  @media (prefers-color-scheme: dark) {
    :root:not([data-theme="light"]) .segmented button.active { background: #2a2a27; }
    :root:not([data-theme="light"]) #theme-toggle .sun { display: block; }
    :root:not([data-theme="light"]) #theme-toggle .moon { display: none; }
  }

  .scan-status { display: inline-flex; align-items: center; gap: 7px; font-size: 11.5px; color: var(--muted); padding: 5px 11px; border: 1px solid var(--border); border-radius: 999px; background: var(--panel); }
  .scan-status .live { width: 6px; height: 6px; border-radius: 50%; background: var(--green); box-shadow: 0 0 0 0 color-mix(in srgb, var(--green) 50%, transparent); animation: pulse 2.6s infinite; }
  .scan-status.scanning .live { background: var(--amber); animation: pulse 1s infinite; }
  @keyframes pulse { 70% { box-shadow: 0 0 0 5px transparent; } 100% { box-shadow: 0 0 0 0 transparent; } }

  /* ── reassurance + intro ─────────────────────────────────────────── */
  .reassure { display: flex; align-items: center; gap: 9px; padding: 8px 22px; font-size: 12px; color: var(--muted); border-bottom: 1px solid var(--border); background: var(--panel); }
  .reassure .shield { color: var(--green); flex-shrink: 0; }
  .reassure b { color: var(--text-dim); font-weight: 560; }

  .intro { margin: 18px 22px 0; padding: 16px 18px; border: 1px solid var(--border); border-radius: 12px; background: var(--panel); box-shadow: var(--shadow); display: flex; gap: 13px; align-items: flex-start; }
  .intro .ico { font-size: 20px; line-height: 1; filter: grayscale(.3); }
  .intro h2 { margin: 0 0 4px; font-size: 14.5px; font-weight: 620; letter-spacing: -.01em; }
  .intro p { margin: 0; color: var(--muted); font-size: 12.5px; max-width: 72ch; }
  .intro .x { margin-left: auto; background: none; border: none; color: var(--faint); font-size: 17px; cursor: pointer; padding: 0 4px; line-height: 1; }
  .intro .x:hover { color: var(--text); }

  /* ── stat cards ──────────────────────────────────────────────────── */
  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; padding: 18px 22px 4px; }
  .stat { position: relative; border: 1px solid var(--border); border-radius: 11px; background: var(--panel); padding: 13px 15px; box-shadow: var(--shadow); overflow: hidden; }
  .stat::before { content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 2px; background: transparent; }
  .stat .n { font-family: var(--mono); font-size: 25px; font-weight: 560; letter-spacing: -.02em; font-variant-numeric: tabular-nums; }
  .stat .lbl { font-size: 11.5px; color: var(--text-dim); margin-top: 2px; font-weight: 500; }
  .stat .sub { font-size: 10.5px; color: var(--faint); margin-top: 1px; }
  .stat.attn::before   { background: var(--amber); }
  .stat.attn .n        { color: var(--amber); }
  .stat.danger::before { background: var(--red); }
  .stat.danger .n      { color: var(--red); }
  .stat.calm .n        { color: var(--text); }

  /* ── layout ──────────────────────────────────────────────────────── */
  main { flex: 1; display: flex; min-height: 0; }
  #content { flex: 1; overflow: auto; padding: 12px 22px 64px; }
  #panel-wrap { width: 460px; flex-shrink: 0; border-left: 1px solid var(--border); background: var(--panel); overflow: auto; display: none; }
  #panel-wrap.open { display: block; }
  @media (max-width: 900px) { #panel-wrap { position: fixed; right: 0; top: 0; height: 100%; box-shadow: var(--shadow); z-index: 30; } }

  /* ── ledger section headers ──────────────────────────────────────── */
  .section-h { display: flex; align-items: center; gap: 10px; margin: 22px 2px 9px; font-size: 10.5px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.11em; color: var(--faint); }
  .section-h::after { content: ""; flex: 1; height: 1px; background: var(--border); }
  .section-h.attn { color: var(--amber); }
  .section-h .count { font-family: var(--mono); font-weight: 500; color: var(--faint); letter-spacing: 0; }

  /* ── group cards + entries ───────────────────────────────────────── */
  details.group { border: 1px solid var(--border); border-radius: 11px; background: var(--panel); margin-bottom: 11px; overflow: hidden; box-shadow: var(--shadow); }
  details.group > summary { cursor: pointer; list-style: none; padding: 11px 14px; display: flex; align-items: center; gap: 10px; }
  details.group > summary::-webkit-details-marker { display: none; }
  .group .chev { color: var(--faint); transition: transform .15s; font-size: 10px; }
  details.group[open] .chev { transform: rotate(90deg); }
  .group .src-ico { color: var(--muted); flex-shrink: 0; display: flex; }
  .group .src-name { font-family: var(--mono); font-size: 12.5px; color: var(--text-dim); }
  .group .src-name .dir { color: var(--faint); }
  .group .src-meta { margin-left: auto; display: flex; align-items: center; gap: 8px; font-size: 11.5px; color: var(--muted); }

  .entries { list-style: none; margin: 0; padding: 0; }
  li.entry { display: grid; grid-template-columns: 24px minmax(140px, 1.2fr) minmax(110px, 1fr) auto; gap: 12px; align-items: center; padding: 10px 14px; border-top: 1px solid var(--border); cursor: pointer; transition: background .1s; }
  li.entry:hover { background: var(--raised); }
  li.entry.selected { background: var(--raised); box-shadow: inset 2px 0 0 var(--text); }
  li.entry.stale { opacity: 0.5; }
  .type-chip { width: 24px; height: 24px; border-radius: 6px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-family: var(--mono); font-size: 9.5px; font-weight: 600; background: var(--raised); border: 1px solid var(--border); color: var(--text-dim); }
  .entry .key { font-family: var(--mono); font-size: 12.5px; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .entry .val { font-family: var(--mono); font-size: 11.5px; color: var(--faint); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .entry .val.revealed { color: var(--green); }
  .entry .right { display: flex; align-items: center; gap: 7px; justify-content: flex-end; }

  /* ── status pills ────────────────────────────────────────────────── */
  .pill { font-size: 10.5px; font-weight: 550; padding: 2px 8px; border-radius: 999px; white-space: nowrap; display: inline-flex; align-items: center; gap: 5px; border: 1px solid var(--border); color: var(--muted); background: var(--panel-2); letter-spacing: .01em; }
  .pill.ok    { color: var(--green); background: var(--green-dim); border-color: var(--green-bd); }
  .pill.warn  { color: var(--amber); background: var(--amber-dim); border-color: var(--amber-bd); }
  .pill.danger{ color: var(--red);   background: var(--red-dim);   border-color: var(--red-bd); }
  .pill.info  { color: var(--blue);  background: var(--blue-dim);  border-color: var(--blue-bd); }
  .pill .pd { width: 5px; height: 5px; border-radius: 50%; background: currentColor; }

  /* ── project chips + manual badge ────────────────────────────────── */
  .chips { display: flex; flex-wrap: wrap; gap: 5px; align-items: center; }
  .chip { font-size: 10.5px; padding: 2px 8px; border-radius: 999px; background: var(--blue-dim); border: 1px solid var(--blue-bd); color: var(--blue); display: inline-flex; align-items: center; gap: 5px; white-space: nowrap; }
  .chip.add { background: transparent; border-style: dashed; border-color: var(--border-2); color: var(--muted); cursor: pointer; }
  .chip.add:hover { color: var(--text); border-color: var(--muted); }
  .chip .x { cursor: pointer; color: var(--faint); }
  .chip .x:hover { color: var(--red); }
  .entry .chips { margin-top: 3px; }
  .badge-manual { font-size: 9.5px; padding: 1px 6px; border-radius: 999px; background: var(--raised); color: var(--muted); border: 1px solid var(--border); text-transform: uppercase; letter-spacing: .04em; }

  /* ── folder tree ─────────────────────────────────────────────────── */
  .tree { border: 1px solid var(--border); border-radius: 11px; background: var(--panel); overflow: hidden; box-shadow: var(--shadow); }
  .tree-row { display: flex; align-items: center; gap: 8px; padding: 7px 14px; border-top: 1px solid var(--border); font-size: 12.5px; cursor: default; }
  .tree-row:first-child { border-top: none; }
  .tree-row.dir { color: var(--text-dim); font-family: var(--mono); font-size: 12px; }
  .tree-row.secret { cursor: pointer; }
  .tree-row.secret:hover { background: var(--raised); }
  .tree-row.secret.selected { background: var(--raised); box-shadow: inset 2px 0 0 var(--text); }
  .tree-row .twig { color: var(--faint); font-family: var(--mono); }
  .tree-row .dir-ico { color: var(--muted); display: flex; }
  .tree-row .dir-count { margin-left: auto; font-size: 10.5px; color: var(--faint); }
  .tree-row.outlier .dir-count { color: var(--amber); }
  .tree-row .k { font-family: var(--mono); font-size: 12px; color: var(--text); }

  /* ── buttons ─────────────────────────────────────────────────────── */
  button { font: inherit; font-size: 12px; cursor: pointer; background: var(--panel); border: 1px solid var(--border-2); border-radius: 7px; padding: 6px 12px; color: var(--text-dim); transition: background .12s, border-color .12s, color .12s; }
  button:hover { background: var(--raised); border-color: var(--faint); color: var(--text); }
  button.ghost { background: transparent; border-color: transparent; color: var(--muted); padding: 5px 8px; }
  button.ghost:hover { background: var(--raised); color: var(--text); }
  button.primary { background: var(--primary); color: var(--primary-fg); border-color: var(--primary); font-weight: 560; }
  button.primary:hover { background: var(--primary); border-color: var(--primary); opacity: .88; }
  button.sm { padding: 4px 10px; font-size: 11.5px; }
  button:disabled { opacity: 0.45; cursor: default; }
  button:focus-visible, .icon-btn:focus-visible, .segmented button:focus-visible { outline: 2px solid var(--focus); outline-offset: 1px; }

  /* ── detail panel ────────────────────────────────────────────────── */
  #panel { padding: 20px 22px 44px; }
  .panel-top { display: flex; align-items: flex-start; gap: 11px; margin-bottom: 2px; }
  .panel-top .type-chip { width: 32px; height: 32px; font-size: 11px; border-radius: 8px; }
  .panel-top .titles { min-width: 0; flex: 1; }
  .panel-top h2 { margin: 0; font-family: var(--mono); font-size: 15px; font-weight: 560; word-break: break-all; }
  .panel-top .type-name { font-size: 11.5px; color: var(--muted); margin-top: 2px; }
  .panel-top .close { margin-left: auto; }

  .value-box { margin: 15px 0; border: 1px solid var(--border); border-radius: 9px; background: var(--bg); padding: 11px 13px; display: flex; align-items: center; gap: 9px; }
  .value-box .v { font-family: var(--mono); font-size: 12.5px; flex: 1; word-break: break-all; color: var(--text-dim); }
  .value-box .v.hidden { letter-spacing: 1px; color: var(--faint); }
  .value-box .v.revealed { color: var(--green); }

  .block-h { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: var(--faint); margin: 22px 0 8px; }

  .finding { border: 1px solid var(--border); border-radius: 9px; padding: 11px 13px; margin-bottom: 9px; background: var(--panel-2); }
  .finding.warn   { border-color: var(--amber-bd); background: var(--amber-dim); }
  .finding.danger { border-color: var(--red-bd); background: var(--red-dim); }
  .finding.calm   { border-color: var(--green-bd); background: var(--green-dim); }
  .finding .f-head { display: flex; align-items: center; gap: 7px; font-weight: 600; font-size: 12.5px; }
  .finding.warn .f-head   { color: var(--amber); }
  .finding.danger .f-head { color: var(--red); }
  .finding.calm .f-head   { color: var(--green); }
  .finding .f-body { font-size: 12px; color: var(--text-dim); margin: 6px 0 0; line-height: 1.5; }
  .finding .f-actions { margin-top: 9px; display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
  .finding code { font-family: var(--mono); font-size: 11px; background: var(--bg); border: 1px solid var(--border-2); border-radius: 5px; padding: 1px 5px; color: var(--text-dim); }

  ul.locations { list-style: none; margin: 0; padding: 0; }
  ul.locations li { display: flex; align-items: center; gap: 9px; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 12px; }
  ul.locations li:last-child { border-bottom: none; }
  ul.locations .loc-ico { color: var(--muted); flex-shrink: 0; display: flex; }
  ul.locations .loc-path { font-family: var(--mono); font-size: 11.5px; color: var(--text-dim); word-break: break-all; }
  ul.locations .loc-sub { color: var(--faint); font-size: 10.5px; }
  ul.locations li.soon { opacity: 0.6; }

  .notes-form label { display: block; margin-bottom: 11px; }
  .notes-form .lbl { font-size: 11.5px; color: var(--muted); margin-bottom: 4px; display: flex; align-items: center; gap: 6px; }
  .notes-form input, .notes-form textarea { width: 100%; font: inherit; font-size: 12.5px; background: var(--bg); color: var(--text); border: 1px solid var(--border-2); border-radius: 7px; padding: 7px 10px; }
  .notes-form input::placeholder, .notes-form textarea::placeholder { color: var(--faint); }
  .notes-form input:focus, .notes-form textarea:focus { outline: none; border-color: var(--focus); }
  .notes-form textarea { min-height: 60px; resize: vertical; }
  .save-state { font-size: 11px; color: var(--faint); height: 13px; margin-top: -4px; }
  .save-state.saving { color: var(--blue); }
  .save-state.saved { color: var(--green); }
  .save-state.err { color: var(--red); }
  .panel-actions { display: flex; gap: 8px; margin-top: 16px; flex-wrap: wrap; }

  .help { display: inline-flex; align-items: center; justify-content: center; width: 14px; height: 14px; border-radius: 50%; font-size: 9px; font-weight: 600; border: 1px solid var(--border-2); color: var(--faint); cursor: help; flex-shrink: 0; }
  .help:hover { color: var(--text); border-color: var(--muted); }

  /* ── modal / add form ────────────────────────────────────────────── */
  .modal-backdrop { position: fixed; inset: 0; background: color-mix(in srgb, var(--bg) 40%, rgba(0,0,0,.5)); backdrop-filter: blur(3px); display: flex; align-items: flex-start; justify-content: center; padding-top: 8vh; z-index: 50; }
  .modal { width: 520px; max-width: calc(100vw - 32px); max-height: 84vh; overflow: auto; background: var(--panel); border: 1px solid var(--border-2); border-radius: 13px; box-shadow: var(--shadow); padding: 22px 24px 26px; }
  .modal h2 { margin: 0 0 4px; font-size: 16px; font-weight: 620; letter-spacing: -.01em; }
  .modal .sub { color: var(--muted); font-size: 12.5px; margin: 0 0 16px; }
  .modal .actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 18px; }
  .helpcard { border: 1px solid var(--border); border-radius: 9px; background: var(--bg); padding: 11px 13px; margin-bottom: 15px; font-size: 12px; color: var(--text-dim); line-height: 1.55; }
  .helpcard b { color: var(--text); }
  .helpcard ul { margin: 7px 0 0; padding-left: 17px; }
  .helpcard li { margin-bottom: 3px; }

  /* ── empty / loading ─────────────────────────────────────────────── */
  .empty { text-align: center; color: var(--muted); padding: 68px 20px; }
  .empty .big { font-size: 36px; margin-bottom: 11px; filter: grayscale(.4); }
  .empty h3 { color: var(--text); font-weight: 620; margin: 0 0 6px; }
  .empty p { margin: 0 auto; max-width: 46ch; font-size: 12.5px; }
  .skeleton { color: var(--faint); padding: 40px 4px; font-size: 12.5px; }
</style>
</head>
<body>
<header class="topbar">
  <div class="brand">
    <span class="logo" aria-hidden="true"><svg width="19" height="19" viewBox="0 0 20 20" fill="none"><rect x="1" y="1" width="18" height="18" rx="5" fill="currentColor"/><path d="M7 9V7.5a3 3 0 0 1 6 0V9" stroke="var(--panel)" stroke-width="1.5"/><rect x="6" y="9" width="8" height="6" rx="1.4" fill="var(--panel)"/></svg></span>
    <span class="mark">Rafter<span class="sub"> Secrets</span></span>
  </div>
  <div class="segmented" id="view-toggle" role="tablist" aria-label="View">
    <button data-view="secret" class="active" role="tab">By secret</button>
    <button data-view="folder" role="tab">By folder</button>
    <button data-view="project" role="tab">By project</button>
  </div>
  <div class="spacer"></div>
  <div class="toast" id="toast" aria-live="polite"></div>
  <button id="add-secret-btn" class="primary sm">+ Add a secret</button>
  <button id="theme-toggle" class="icon-btn" title="Toggle light / dark" aria-label="Toggle theme">
    <svg class="moon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    <svg class="sun" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
  </button>
  <div class="scan-status" id="scan-status" title="Rafter Secrets re-checks automatically whenever a watched file changes.">
    <span class="live"></span>
    <span id="scan-status-text">watching for changes</span>
  </div>
</header>

<div class="reassure">
  <span class="shield" aria-hidden="true">&#x1F6E1;</span>

<main>

  </div>

</main>

<div id="modal-root"></div>

<script src="/static/app.js"></script>
