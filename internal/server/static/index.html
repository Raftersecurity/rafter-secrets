<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Rafter Secrets</title>
<meta name="referrer" content="no-referrer">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%230a0a0a'/%3E%3Cpath d='M11 14v-2a5 5 0 0 1 10 0v2' fill='none' stroke='%23fafafa' stroke-width='2'/%3E%3Crect x='9' y='14' width='14' height='10' rx='2' fill='%23fafafa'/%3E%3C/svg%3E">
<style>
  /* Rafter Secrets — theme tokens. Monochrome like Rafter: near-black ink,
     neutral grays, clean surfaces; colour reserved for status. Light is the
     default; the OS preference applies via prefers-color-scheme (no inline
     script, so the strict CSP holds) and the header toggle sets an explicit
     [data-theme] override. */
  :root {
    --sans: "Geist", ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    --mono: "Geist Mono", ui-monospace, "SF Mono", SFMono-Regular, Menlo, Consolas, monospace;
    --bg:#ffffff; --surface:#fafafa; --surface-h:#f4f4f5; --card:#ffffff; --card-2:#fafafa;
    --line:#ececec; --line-2:#e0e0e0; --text:#171717; --dim:#404040; --muted:#737373; --faint:#a3a3a3;
    --ink:#0a0a0a; --ink-fg:#fafafa;
    --green:#16a34a; --green-bg:#e8f6ee; --green-line:#cfeada;
    --amber:#b45309; --amber-bg:#fdf4e3; --amber-line:#f0e1c2;
    --red:#dc2626; --red-bg:#fdecec; --red-line:#f6d6d3;
    --blue:#2563eb; --blue-bg:#eaf1fd; --blue-line:#d4e2fa;
    --scrim:rgba(20,20,20,0.34);
    --shadow-drawer:-30px 0 80px rgba(20,20,20,0.16);
    --shadow-card:0 1px 2px rgba(20,20,20,0.04);
    --shadow-pop:0 24px 60px -16px rgba(20,20,20,0.26);
    color-scheme: light;
  }
  :root[data-theme="dark"] { --bg:#0a0a0a; --surface:rgba(255,255,255,0.026); --surface-h:rgba(255,255,255,0.052); --card:#101010; --card-2:#161616; --line:rgba(255,255,255,0.09); --line-2:rgba(255,255,255,0.16); --text:#fafafa; --dim:#d3d3d3; --muted:#8d8d8d; --faint:#5b5b5b; --ink:#fafafa; --ink-fg:#0a0a0a; --green:#54c98a; --green-bg:rgba(84,201,138,0.12); --green-line:rgba(84,201,138,0.26); --amber:#d9a14e; --amber-bg:rgba(217,161,78,0.12); --amber-line:rgba(217,161,78,0.26); --red:#ef8478; --red-bg:rgba(239,132,120,0.12); --red-line:rgba(239,132,120,0.28); --blue:#7ea2f0; --blue-bg:rgba(126,162,240,0.13); --blue-line:rgba(126,162,240,0.28); --scrim:rgba(0,0,0,0.66); --shadow-drawer:-30px 0 80px rgba(0,0,0,0.55); --shadow-card:0 1px 2px rgba(0,0,0,0.22); --shadow-pop:0 24px 60px rgba(0,0,0,0.6); color-scheme: dark; }
  @media (prefers-color-scheme: dark) {
    :root:not([data-theme="light"]) { --bg:#0a0a0a; --surface:rgba(255,255,255,0.026); --surface-h:rgba(255,255,255,0.052); --card:#101010; --card-2:#161616; --line:rgba(255,255,255,0.09); --line-2:rgba(255,255,255,0.16); --text:#fafafa; --dim:#d3d3d3; --muted:#8d8d8d; --faint:#5b5b5b; --ink:#fafafa; --ink-fg:#0a0a0a; --green:#54c98a; --green-bg:rgba(84,201,138,0.12); --green-line:rgba(84,201,138,0.26); --amber:#d9a14e; --amber-bg:rgba(217,161,78,0.12); --amber-line:rgba(217,161,78,0.26); --red:#ef8478; --red-bg:rgba(239,132,120,0.12); --red-line:rgba(239,132,120,0.28); --blue:#7ea2f0; --blue-bg:rgba(126,162,240,0.13); --blue-line:rgba(126,162,240,0.28); --scrim:rgba(0,0,0,0.66); --shadow-drawer:-30px 0 80px rgba(0,0,0,0.55); --shadow-card:0 1px 2px rgba(0,0,0,0.22); --shadow-pop:0 24px 60px rgba(0,0,0,0.6); color-scheme: dark; }
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body { background-color: var(--bg); color: var(--text); font-family: var(--sans); font-size: 14px; line-height: 1.55; -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; transition: background-color .2s, color .2s; }
  .mono { font-family: var(--mono); }
  ::selection { background: rgba(125,125,125,0.28); }
  a { color: var(--blue); text-decoration: none; } a:hover { text-decoration: underline; }

  .app { min-height: 100vh; display: flex; flex-direction: column; }

  /* buttons */
  .btn { font: inherit; font-size: 13.5px; font-weight: 500; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; white-space: nowrap; background: var(--surface-h); color: var(--dim); border: 1px solid var(--line-2); border-radius: 10px; padding: 8px 14px; transition: background .14s, border-color .14s, color .14s, transform .05s; }
  .btn:hover { color: var(--text); border-color: var(--faint); }
  .btn:active { transform: translateY(0.5px); }
  .btn.sm { padding: 6px 11px; font-size: 12.5px; border-radius: 9px; }
  .btn.ghost { background: transparent; border-color: transparent; color: var(--muted); }
  .btn.ghost:hover { background: var(--surface-h); color: var(--text); }
  .btn.primary { background: var(--ink); color: var(--ink-fg); border: 1px solid var(--ink); font-weight: 560; }
  .btn.primary:hover { color: var(--ink-fg); opacity: 0.88; }
  .btn:disabled { opacity: 0.5; cursor: default; }
  .btn:focus-visible, .iconbtn:focus-visible, .segmented button:focus-visible { outline: 2px solid var(--blue); outline-offset: 1px; }
  .iconbtn { width: 36px; height: 36px; border-radius: 10px; display: inline-flex; align-items: center; justify-content: center; background: var(--surface-h); border: 1px solid var(--line-2); color: var(--muted); cursor: pointer; transition: background .14s, color .14s, border-color .14s; }
  .iconbtn:hover { color: var(--text); border-color: var(--faint); }
  #theme-toggle .sun { display: none; } #theme-toggle .moon { display: block; }
  :root[data-theme="dark"] #theme-toggle .sun { display: block; } :root[data-theme="dark"] #theme-toggle .moon { display: none; }
  @media (prefers-color-scheme: dark) { :root:not([data-theme="light"]) #theme-toggle .sun { display: block; } :root:not([data-theme="light"]) #theme-toggle .moon { display: none; } }

  /* top bar */
  .topbar { position: sticky; top: 0; z-index: 30; display: flex; align-items: center; gap: 16px; padding: 14px 28px; border-bottom: 1px solid var(--line); background: color-mix(in srgb, var(--bg) 78%, transparent); backdrop-filter: blur(14px) saturate(1.4); }
  .brand { display: flex; align-items: center; gap: 11px; }
  .brand .logo { color: var(--text); display: flex; align-items: center; }
  .brand .wordmark { font-size: 15.5px; font-weight: 640; letter-spacing: -0.014em; }
  .brand .wordmark span { color: var(--muted); font-weight: 450; }
  .topbar .spacer { flex: 1; }
  .segmented { display: inline-flex; background: var(--surface); border: 1px solid var(--line); border-radius: 11px; padding: 3px; gap: 2px; }
  .segmented button { font: inherit; font-size: 13px; font-weight: 500; cursor: pointer; background: transparent; border: none; color: var(--muted); padding: 6px 14px; border-radius: 8px; transition: background .14s, color .14s; white-space: nowrap; }
  .segmented button:hover { color: var(--dim); }
  .segmented button.active { background: var(--card); color: var(--text); box-shadow: var(--shadow-card), inset 0 0 0 1px var(--line); }
  .watching { display: inline-flex; align-items: center; gap: 8px; padding: 7px 13px; border-radius: 999px; background: var(--surface); border: 1px solid var(--line); color: var(--muted); font-size: 12.5px; white-space: nowrap; }
  .watching .live { width: 7px; height: 7px; border-radius: 50%; background: var(--green); box-shadow: 0 0 0 0 var(--green-line); animation: pulse 2.6s infinite; }
  .watching.scanning .live { background: var(--amber); animation: pulse 1s infinite; }
  @keyframes pulse { 0%{box-shadow:0 0 0 0 var(--green-line)} 70%{box-shadow:0 0 0 6px transparent} 100%{box-shadow:0 0 0 0 transparent} }

  /* page shell + hero */
  .page { width: 100%; max-width: 940px; margin: 0 auto; padding: 8px 28px 80px; flex: 1; }
  .hero { padding: 44px 4px 28px; }
  .eyebrow { font-family: var(--mono); font-size: 12px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--faint); margin-bottom: 20px; }
  .statement { font-size: 37px; line-height: 1.22; font-weight: 400; letter-spacing: -0.022em; max-width: 22ch; margin: 0; color: var(--muted); }
  .statement .grad, .statement .num, .statement b { font-weight: 500; color: var(--text); font-variant-numeric: tabular-nums; }
  .statement .grad { font-weight: 560; }
  .lede { color: var(--muted); font-size: 15px; line-height: 1.6; max-width: 60ch; margin: 20px 0 0; }
  .lede b { color: var(--dim); font-weight: 550; }

  /* figures */
  .figures { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-top: 34px; }
  .figure { padding: 17px 18px 16px; border: 1px solid var(--line); border-radius: 14px; background: var(--card); box-shadow: var(--shadow-card); display: flex; flex-direction: column; }
  .figure .ftop { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 14px; }
  .figure .flbl { color: var(--muted); font-size: 11px; font-weight: 600; letter-spacing: 0.07em; text-transform: uppercase; white-space: nowrap; }
  .figure .fbadge { font-size: 11px; font-weight: 500; padding: 3px 9px; border-radius: 999px; white-space: nowrap; }
  .figure .fbadge.ok { color: var(--green); background: var(--green-bg); }
  .figure .fbadge.warn { color: var(--amber); background: var(--amber-bg); }
  .figure .fbadge.bad { color: var(--red); background: var(--red-bg); }
  .figure .fbadge.info { color: var(--blue); background: var(--blue-bg); }
  .figure .fnum { font-size: 38px; font-weight: 600; letter-spacing: -0.035em; line-height: 1; color: var(--text); font-variant-numeric: tabular-nums; }
  .figure .fbar { height: 6px; border-radius: 4px; background: var(--surface-h); margin-top: 15px; overflow: hidden; }
  .figure .fbar i { display: block; height: 100%; border-radius: 4px; }
  .figure .fbar i.ink { background: var(--text); opacity: 0.78; }
  .figure .fbar i.green { background: var(--green); } .figure .fbar i.amber { background: var(--amber); }
  .figure .fbar i.red { background: var(--red); } .figure .fbar i.blue { background: var(--blue); }
  .figure .fsub { color: var(--muted); font-size: 12px; margin-top: 11px; line-height: 1.4; }

  /* section + rows */
  .sec { display: flex; align-items: baseline; gap: 11px; margin: 44px 4px 12px; }
  .sec h2 { font-size: 17px; font-weight: 600; letter-spacing: -0.012em; margin: 0; }
  .sec .sc { font-family: var(--mono); font-size: 13px; color: var(--faint); }
  .sec .shint { margin-left: auto; font-size: 12.5px; color: var(--faint); white-space: nowrap; }
  .list { display: flex; flex-direction: column; }
  .row { display: grid; grid-template-columns: 46px 1fr auto; align-items: center; gap: 18px; padding: 18px 16px; border-top: 1px solid var(--line); position: relative; cursor: pointer; border-radius: 13px; transition: background .14s; }
  .list .row:first-child { border-top: none; }
  .row:hover { background: var(--surface); }
  .row.flag.danger { background: var(--red-bg); border-top-color: transparent; box-shadow: inset 0 0 0 1px var(--red-line); margin: 5px 0; }
  .row.flag.warn { background: var(--amber-bg); border-top-color: transparent; box-shadow: inset 0 0 0 1px var(--amber-line); margin: 5px 0; }
  .row.stale { opacity: 0.55; }
  .tile { width: 46px; height: 46px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-family: var(--mono); font-size: 13px; font-weight: 500; color: var(--dim); background: var(--surface-h); border: 1px solid var(--line); flex-shrink: 0; }
  .row.flag .tile { background: var(--card); }
  .row .rbody { min-width: 0; }
  .row .rname { font-size: 16px; font-weight: 550; letter-spacing: -0.012em; color: var(--text); }
  .row .rsub { display: flex; align-items: center; gap: 9px; margin-top: 4px; color: var(--muted); font-size: 12.5px; min-width: 0; white-space: nowrap; }
  .row .rsub > span:first-child { flex-shrink: 0; }
  .row .rsub .sdot { width: 3px; height: 3px; border-radius: 50%; background: var(--faint); flex-shrink: 0; }
  .row .rsub code { font-family: var(--mono); font-size: 11.5px; color: var(--faint); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .row .rright { display: flex; align-items: center; gap: 14px; justify-content: flex-end; }
  .row .dots { font-family: var(--mono); letter-spacing: 2px; color: var(--faint); font-size: 13px; opacity: 0.8; }
  .row .chev { color: var(--faint); display: flex; transition: transform .14s; }
  .row:hover .chev { transform: translateX(2px); color: var(--muted); }
  .treepath { font-family: var(--mono); font-size: 12px; color: var(--faint); margin: 16px 4px 2px; }

  /* pills + tags */
  .pill { display: inline-flex; align-items: center; gap: 7px; padding: 6px 12px; border-radius: 999px; font-size: 12.5px; font-weight: 500; white-space: nowrap; }
  .pill .pd { width: 7px; height: 7px; border-radius: 50%; background: currentColor; flex-shrink: 0; }
  .pill.ok { color: var(--green); background: var(--green-bg); }
  .pill.danger { color: var(--red); background: var(--red-bg); box-shadow: inset 0 0 0 1px var(--red-line); }
  .pill.warn { color: var(--amber); background: var(--amber-bg); box-shadow: inset 0 0 0 1px var(--amber-line); }
  .pill.info { color: var(--blue); background: var(--blue-bg); }
  .pill.manual, .pill.muted { color: var(--muted); background: var(--surface-h); }
  .pill.manual { box-shadow: inset 0 0 0 1px var(--line-2); }
  .tag { display: inline-flex; align-items: center; gap: 6px; padding: 3px 9px; border-radius: 999px; font-size: 11.5px; background: var(--blue-bg); color: var(--blue); white-space: nowrap; }
  .tag .x { cursor: pointer; opacity: 0.6; display: flex; } .tag .x:hover { opacity: 1; }
  .tag.add { background: transparent; border: 1px dashed var(--line-2); color: var(--muted); cursor: pointer; }
  .tag.add:hover { color: var(--text); border-color: var(--faint); }

  /* empty / foot */
  .empty { text-align: center; padding: 80px 20px; }
  .empty .ec { width: 56px; height: 56px; border-radius: 16px; margin: 0 auto 18px; display: flex; align-items: center; justify-content: center; background: var(--green-bg); color: var(--green); }
  .empty h3 { font-size: 19px; font-weight: 600; margin: 0 0 8px; }
  .empty p { color: var(--muted); max-width: 46ch; margin: 0 auto 20px; font-size: 14px; }
  .foot { margin-top: 40px; padding-top: 22px; border-top: 1px solid var(--line); display: flex; align-items: center; gap: 10px; color: var(--faint); font-size: 12.5px; }
  .foot .sh { color: var(--green); display: flex; flex-shrink: 0; }

  /* toast */
  .toast-wrap { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); z-index: 80; display: flex; flex-direction: column; gap: 8px; align-items: center; pointer-events: none; }
  .toast { display: flex; align-items: center; gap: 9px; padding: 11px 16px; border-radius: 12px; background: var(--card); border: 1px solid var(--line-2); box-shadow: var(--shadow-pop); font-size: 13px; color: var(--text); animation: toast-in .22s cubic-bezier(.2,.8,.3,1); }
  .toast .ti { display: flex; } .toast.ok .ti { color: var(--green); } .toast.err .ti { color: var(--red); }
  @keyframes toast-in { from { opacity: 0; transform: translateY(8px); } }

  /* drawer + modal */
  .scrim { position: fixed; inset: 0; background: var(--scrim); backdrop-filter: blur(3px); z-index: 50; animation: scrim-in .2s ease; }
  @keyframes scrim-in { from { opacity: 0; } }
  .drawer { position: fixed; top: 0; right: 0; height: 100%; width: 480px; max-width: 94vw; z-index: 60; background: var(--bg); border-left: 1px solid var(--line-2); box-shadow: var(--shadow-drawer); display: flex; flex-direction: column; animation: drawer-in .26s cubic-bezier(.2,.8,.25,1); }
  @keyframes drawer-in { from { transform: translateX(26px); opacity: 0.4; } }
  .dscroll { overflow-y: auto; flex: 1; padding: 22px 26px 40px; }
  .dscroll::-webkit-scrollbar { width: 9px; } .dscroll::-webkit-scrollbar-thumb { background: var(--line-2); border-radius: 6px; border: 2px solid transparent; background-clip: padding-box; }
  .dhead { display: flex; align-items: flex-start; gap: 13px; }
  .dhead .tile { width: 40px; height: 40px; border-radius: 11px; font-size: 13px; }
  .dhead .dtitles { min-width: 0; flex: 1; }
  .dhead h2 { font-family: var(--mono); font-size: 16px; font-weight: 500; margin: 0; word-break: break-all; letter-spacing: -0.01em; }
  .dhead .dtype { font-size: 12.5px; color: var(--muted); margin-top: 3px; } .dhead .dtype .em { color: var(--dim); }
  .valuebox { display: flex; align-items: center; gap: 10px; margin: 20px 0 6px; padding: 13px 14px; border: 1px solid var(--line); border-radius: 12px; background: var(--surface); }
  .valuebox .v { font-family: var(--mono); font-size: 13px; flex: 1; word-break: break-all; color: var(--dim); }
  .valuebox .v.hidden { letter-spacing: 2px; color: var(--faint); } .valuebox .v.revealed { color: var(--green); }
  .blk-h { font-size: 11.5px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.09em; color: var(--faint); margin: 26px 0 11px; }
  .finding { border: 1px solid var(--line); border-radius: 13px; padding: 14px 15px; margin-bottom: 11px; background: var(--surface); }
  .finding .fh { display: flex; align-items: center; gap: 9px; font-weight: 600; font-size: 13.5px; }
  .finding .fh .fi { display: flex; flex-shrink: 0; }
  .finding .fb { font-size: 13px; color: var(--dim); margin: 9px 0 0; line-height: 1.55; } .finding .fb b { color: var(--text); font-weight: 600; }
  .finding code { font-family: var(--mono); font-size: 11.5px; background: var(--card-2); border: 1px solid var(--line); border-radius: 6px; padding: 2px 6px; color: var(--dim); }
  .finding .fact { margin-top: 12px; display: flex; flex-wrap: wrap; gap: 9px; align-items: center; } .finding .fact .hint { font-size: 12px; color: var(--muted); }
  .finding.danger { border-color: var(--red-line); background: var(--red-bg); } .finding.danger .fh { color: var(--red); }
  .finding.warn { border-color: var(--amber-line); background: var(--amber-bg); } .finding.warn .fh { color: var(--amber); }
  .finding.info { border-color: var(--blue-line); background: var(--blue-bg); } .finding.info .fh { color: var(--blue); }
  .finding.ok { border-color: var(--green-line); background: var(--green-bg); } .finding.ok .fh { color: var(--green); }
  .locs { list-style: none; margin: 0; padding: 0; }
  .locs li { display: flex; align-items: flex-start; gap: 11px; padding: 11px 0; border-top: 1px solid var(--line); } .locs li:first-child { border-top: none; }
  .locs .li-ico { color: var(--muted); display: flex; flex-shrink: 0; margin-top: 1px; }
  .locs .lp { font-family: var(--mono); font-size: 12.5px; color: var(--dim); word-break: break-all; }
  .locs .ls { font-size: 11.5px; color: var(--faint); margin-top: 3px; display: flex; align-items: center; gap: 7px; }
  .locs .ls .warnflag { color: var(--red); } .locs .ls .warnflag.group { color: var(--amber); }
  .chips { display: flex; flex-wrap: wrap; gap: 7px; align-items: center; }
  .chip-input { font: inherit; font-size: 12px; width: 130px; background: var(--surface); color: var(--text); border: 1px solid var(--blue); border-radius: 999px; padding: 4px 11px; outline: none; }
  .form label { display: block; margin-bottom: 14px; }
  .form .lbl { display: flex; align-items: center; gap: 6px; font-size: 12.5px; color: var(--muted); margin-bottom: 5px; }
  .form input, .form textarea { width: 100%; font: inherit; font-size: 13.5px; background: var(--surface); color: var(--text); border: 1px solid var(--line-2); border-radius: 10px; padding: 9px 11px; transition: border-color .14s; }
  .form input::placeholder, .form textarea::placeholder { color: var(--faint); }
  .form input:focus, .form textarea:focus { outline: none; border-color: var(--blue); }
  .form textarea { min-height: 68px; resize: vertical; line-height: 1.5; }
  .help { display: inline-flex; align-items: center; justify-content: center; width: 15px; height: 15px; border-radius: 50%; font-size: 10px; font-weight: 600; border: 1px solid var(--line-2); color: var(--faint); cursor: help; }
  .save-state { font-size: 11.5px; color: var(--faint); height: 15px; margin: -6px 0 8px; transition: color .2s; }
  .save-state.saving { color: var(--blue); } .save-state.saved { color: var(--green); } .save-state.err { color: var(--red); }
  .dactions { display: flex; gap: 9px; flex-wrap: wrap; margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--line); }
  .modal-wrap { position: fixed; inset: 0; z-index: 70; display: flex; align-items: flex-start; justify-content: center; padding: 8vh 20px 20px; overflow-y: auto; }
  .modal { width: 540px; max-width: 100%; background: var(--bg); border: 1px solid var(--line-2); border-radius: 18px; box-shadow: var(--shadow-pop); padding: 26px 28px 24px; animation: modal-in .24s cubic-bezier(.2,.8,.25,1); }
  @keyframes modal-in { from { opacity: 0; transform: translateY(12px) scale(0.99); } }
  .modal .mhead { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 6px; }
  .modal h2 { font-size: 19px; font-weight: 600; letter-spacing: -0.015em; margin: 0; }
